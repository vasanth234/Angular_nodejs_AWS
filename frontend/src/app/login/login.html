<div class="login-container">
  <h2>Login</h2>

  <form>

    <div class="form-group">
      <label>Email</label>
      <input
        type="email"
        [value]="logged().email"
        (input)="logged.update(u => ({ ...u, email: $any($event.target).value }))"
        placeholder="Enter your email"
      />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input
        type="password"
        [value]="logged().password"
        (input)="logged.update(u => ({ ...u, password: $any($event.target).value }))"
        placeholder="Enter your password"
      />
    </div>

    <div class="preview">
      <p><b>Email:</b> {{ logged().email }}</p>
      <p><b>Password:</b> {{ logged().password }}</p>
    </div>

  <button
  type="button"
  (click)="onLogin()">
  Login
</button>


  </form>

  <p>
    Don't have an account?
    <a routerLink="/register">Register</a>
  </p>
</div>
