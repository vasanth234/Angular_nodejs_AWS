<div class="login-container">
  <h2>Login</h2>

  <form>
    <!-- Email -->
    <div class="form-group">
      <label>Email</label>
      <input
        type="email"
        [value]="logged().email"
        (input)="logged.update(u => ({ ...u, email: $any($event.target).value }))"
        placeholder="Enter your email"
      />
    </div>

    <!-- Password -->
    <div class="form-group">
      <label>Password</label>
      <input
        type="password"
        [value]="logged().password"
        (input)="logged.update(u => ({ ...u, password: $any($event.target).value }))"
        placeholder="Enter your password"
      />
    </div>

    <!-- Live Preview (optional for debugging) -->
    <div class="preview">
      <h3>Preview</h3>
      <p><b>Email:</b> {{ logged().email }}</p>
      <p><b>Password:</b> {{ logged().password }}</p>
    </div>

    <button type="button" routerLink="/home">Login</button>
  </form>

<p>
  Don't have an account?
  <a routerLink="/register">Register</a>
</p>
</div>
