<div class="chat-container">

  <div class="messages">
    <div *ngFor="let msg of messages" 
         [ngClass]="msg.role">

      <span>{{ msg.text }}</span>
    </div>
  </div>

  <div class="input-box">
    <input 
      [(ngModel)]="userInput"
      placeholder="Ask something..."
      (keyup.enter)="sendMessage()"
    />

    <button (click)="sendMessage()">Send</button>
  </div>

</div>
