<div class="register-container">
  <h2>Register</h2>

  <form>
    <!-- Name -->
    <div class="form-group">
      <label>Name</label>
      <input
        type="text"
        [value]="user().name"
        (input)="user.update(u => ({ ...u, name: $any($event.target).value }))"
        placeholder="Enter your name"
      />
    </div>

    <!-- Email -->
    <div class="form-group">
      <label>Email</label>
      <input
        type="email"
        [value]="user().email"
        (input)="user.update(u => ({ ...u, email: $any($event.target).value }))"
        placeholder="Enter your email"
      />
    </div>

    <!-- Password -->
    <div class="form-group">
      <label>Password</label>
      <input
        type="password"
        [value]="user().password"
        (input)="user.update(u => ({ ...u, password: $any($event.target).value }))"
        placeholder="Enter your password"
      />
    </div>

    <!-- Live Preview -->
    <div class="preview">
      <h3>Preview</h3>
      <p><b>Name:</b> {{ user().name }}</p>
      <p><b>Email:</b> {{ user().email }}</p>
      <p><b>Password:</b> {{ user().password }}</p>
    </div>

    <button type="button" (click)="onRegister()"  routerLink="/home">Register</button>
  </form>

  <p>Already have credentials?<a routerLink="/login">Login</a></p>
</div>
